# This is a Docker Compose file for setting up the atheragent environment.

name: atheragent-stack
services:
  atheragent:
    build:
      context: . # The build context is the current directory
      dockerfile: Dockerfile
    command: npm run dev # Use npm run dev for development
    env_file: .env.local # Load environment variables
    ports:
      - '3001:3000' # Maps port 3001 on the host to port 3000 in the container
    depends_on:
      - redis
      - searxng

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  redisinsight:
    image: redislabs/redisinsight:latest
    ports:
      - '8002:8001'
    volumes:
      - redisinsight_data:/db

  searxng:
    image: searxng/searxng
    ports:
      - '${SEARXNG_PORT:-8081}:8080'
    env_file: .env.local
    volumes:
      - ./searxng-limiter.toml:/etc/searxng/limiter.toml
      - ./searxng-settings.yml:/etc/searxng/settings.yml
      - searxng_data:/data

volumes:
  redis_data:
  redisinsight_data:
  searxng_data:
